<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shippy Sheep Studio — Logo concepts</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  body { margin: 0; font-family: 'Figtree', sans-serif; }
  .ab { background: #fff; height: 100%; box-sizing: border-box; padding: 26px; display: flex; flex-direction: column; gap: 18px; }
  .ab-rationale { font-size: 13.5px; color: #6b7a8d; line-height: 1.5; margin: -6px 0 0; }
  .mark-stage { height: 150px; border-radius: 22px; display: grid; place-items: center; }
  .mark-stage .m { width: 100px; height: 100px; }
  .lockup { display: flex; align-items: center; gap: 14px; }
  .lockup .m { width: 52px; height: 52px; flex: none; }
  .darkchip { background: #182b3d; border-radius: 18px; padding: 16px 20px; display: flex; align-items: center; gap: 13px; }
  .darkchip .m { width: 42px; height: 42px; flex: none; }
  .favs { display: flex; align-items: center; gap: 14px; }
  .fav { border-radius: 10px; display: grid; place-items: center; }
  .fav-label { font-size: 12px; color: #98a6b6; font-family: 'Fredoka', sans-serif; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-left: auto; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="#2f9ee0"/><polygon points="14,24 26,14 32,28" fill="#fff"/><polygon points="42,16 50,26 32,28" fill="#e3ecf3"/><polygon points="27,30 38,30 32,42" fill="#182b3d"/></svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="logos.jsx"></script>
<script type="text/babel">
const CONCEPTS = [
  { id: 'sail2', label: 'A · Sailsheep', accent: '#ff7a5c', tint: '#eaf6ff', rationale: 'The literal idea — a little boat with a wool sail and a sheep aboard, riding a wave. The clearest “sheep on a ship” read.' },
  { id: 'helm2', label: 'B · Helmsheep', accent: '#1f4e79', tint: '#eaf4fb', rationale: 'A ship’s wheel with a faceted sheep face at the hub. Badge-like and confident — great as an app icon or seal.' },
  { id: 'captain2', label: 'C · Captain', accent: '#1f4e79', tint: '#eaf4fb', rationale: 'Sheep head in a sailor cap. The friendliest mascot of the set — strong personality, very merch-able.' },
  { id: 'woolsail2', label: 'D · Woolsail', accent: '#2f9ee0', tint: '#eaf6ff', rationale: 'Minimal twin-sail mark with a wool main-sail and a single dot-eye. The cleanest / most scalable nautical option.' },
  { id: 'paper2', label: 'E · Paper Boat', accent: '#ffc23d', tint: '#fff7e3', rationale: 'Origami boat carrying a sheep on faceted waves. Playful and craft-y — leans into the low-poly “folded paper” feel.' },
  { id: 'wave2', label: 'F · Wave', accent: '#8a6cff', tint: '#f1edff', rationale: 'Abstract wool-cloud-over-waves monogram (no literal ship). The most modern/flexible if you want something less illustrative.' },
];
const MARK_FOR = { sail2: 'sail', helm2: 'helm', captain2: 'captain', woolsail2: 'woolsail', paper2: 'paper', wave2: 'wave' };

function Card({ c }) {
  const Mark = LOGOS[MARK_FOR[c.id]];
  return (
    <div className="ab">
      <p className="ab-rationale">{c.rationale}</p>
      <div className="mark-stage" style={{ background: c.tint }}>
        <div className="m"><Mark /></div>
      </div>
      <div className="lockup">
        <div className="m"><Mark /></div>
        <Wordmark accent={c.accent} />
      </div>
      <div className="darkchip">
        <div className="m"><Mark onDark /></div>
        <Wordmark onDark accent={c.accent} />
      </div>
      <div className="favs">
        {[36, 26, 18].map(s => (
          <div className="fav" key={s} style={{ width: s + 14, height: s + 14, background: c.tint }}>
            <div style={{ width: s, height: s }}><Mark /></div>
          </div>
        ))}
        <span className="fav-label">favicon sizes</span>
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="logos-ship" title="Shippy Sheep Studio — logo concepts" subtitle="“Shippy Sheep” — a sheep on a sailing ship. Six low-poly / playful directions, each shown as the mark, the wordmark lockup, a dark-background version, and small favicon sizes. Tell me which to develop (we can mix marks + colors).">
        {CONCEPTS.map(c => (
          <DCArtboard key={c.id} id={c.id} label={c.label} width={520} height={486}>
            <Card c={c} />
          </DCArtboard>
        ))}
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
