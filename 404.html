<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page not found — Shippy Sheep Studio</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Figtree:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root { --ink:#182b3d; --soft:#56708a; --primary:#2f9ee0; }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; font-family: 'Figtree', system-ui, sans-serif; color: var(--ink);
    background: linear-gradient(180deg, #a7ddff 0%, #e8f7ff 60%, #eef8ff 100%);
    display: grid; place-items: center; text-align: center; padding: 24px; min-height: 100vh;
  }
  .wrap { max-width: 540px; }
  .mark { width: 92px; height: 92px; margin: 0 auto 8px; filter: drop-shadow(0 8px 18px rgba(20,40,70,.22)); animation: bob 4s cubic-bezier(.16,1,.3,1) infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-10px) rotate(2deg); } }
  .code { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 84px; line-height: 1; color: var(--primary); letter-spacing: -.02em; margin: 6px 0 0; }
  h1 { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: clamp(26px, 5vw, 38px); margin: 6px 0 0; line-height: 1.05; }
  p { color: var(--soft); font-size: 17px; line-height: 1.6; margin: 16px auto 28px; max-width: 40ch; }
  .btn {
    display: inline-flex; align-items: center; gap: 9px; font-family: 'Fredoka', sans-serif; font-weight: 600;
    font-size: 16px; background: var(--primary); color: #fff; text-decoration: none;
    padding: 15px 26px; border-radius: 999px; box-shadow: 0 12px 26px -10px rgba(47,158,224,.7);
    transition: transform .2s cubic-bezier(.16,1,.3,1), filter .2s;
  }
  .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
  @media (prefers-reduced-motion: reduce) { .mark { animation: none; } }
</style>
</head>
<body>
  <main class="wrap">
    <img class="mark" src="favicon.svg" alt="Shippy Sheep Studio" />
    <div class="code">404</div>
    <h1>Looks like this one wandered off</h1>
    <p>This page has strayed from the flock — the link may be broken or the page has moved. Head back to the home page and we'll herd you in the right direction.</p>
    <a class="btn" href="/shippy-sheep-website/">Back to the pasture →</a>
  </main>
</body>
