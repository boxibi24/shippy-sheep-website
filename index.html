<!-- Set the colour mode before first paint (no flash): light = Wool & Paper, dark = Nightfall.
     Stored choice wins; otherwise follow the OS preference. -->
<script>
  (function () {
    try {
      var m = localStorage.getItem('shippy-mode');
      if (m !== 'light' && m !== 'dark') {
        m = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
      }
      var r = document.documentElement;
      r.setAttribute('data-direction', m === 'dark' ? 'nightfall' : 'paper');
      r.setAttribute('data-density', 'comfy');
    } catch (e) {}
  })();
</script>

<style>
/* ============================================================
   Shippy Sheep Studio — low-poly playground
   Base tokens, three whole-look directions, density + utilities
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: var(--font-body);
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  letter-spacing: -0.005em;
  overflow-x: clip;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }

/* -------- type roles -------- */
:root {
  --font-display: 'Fredoka', system-ui, sans-serif;
  --font-body: 'Figtree', system-ui, sans-serif;

  /* spacing scale */
  --maxw: 1240px;
  --gutter: clamp(20px, 5vw, 64px);

  /* density (regular default; overridden by data-density) */
  --section-pad: clamp(72px, 11vh, 132px);
  --card-pad: 30px;
  --stack: 22px;

  /* shape */
  --r-sm: 14px;
  --r-md: 20px;
  --r-lg: 28px;
  --r-xl: 38px;
  --r-pill: 999px;

  /* motion */
  --ease: cubic-bezier(0.16, 1, 0.30, 1);
  --dur: 240ms;

  --shadow-card: 0 1px 2px rgba(20,30,50,.06), 0 18px 40px -22px rgba(20,30,50,.35);
  --shadow-hover: 0 2px 6px rgba(20,30,50,.10), 0 30px 60px -26px rgba(20,30,50,.45);
}

/* ============================================================
   DIRECTION 1 — PASTURE (light, sunny meadow) — default
   ============================================================ */
[data-direction="pasture"] {
  --bg: #eef8ff;
  --bg-tint: #dcefff;
  --surface: #ffffff;
  --surface-2: #f4f9ff;
  --ink: #182b3d;
  --ink-soft: #56708a;
  --line: rgba(24,43,61,.10);

  --c1: #2f9ee0;   /* sky */
  --c2: #4fbf6a;   /* grass */
  --c3: #ffc23d;   /* sun */
  --c4: #ff7a5c;   /* coral */
  --c5: #8a6cff;   /* plum */
  --primary: #2f9ee0;
  --on-primary: #ffffff;

  --sky-top: #9ed8ff;
  --sky-bot: #e8f7ff;
  --hill-back: #9fd6a4;
  --hill-mid: #66c478;
  --hill-front: #3da85c;
  --sun: #ffd24a;

  --glow: 0 0 0 rgba(0,0,0,0);
}

/* ============================================================
   DIRECTION 2 — NIGHTFALL (dark, glowing facets)
   ============================================================ */
[data-direction="nightfall"] {
  --bg: #0c1030;
  --bg-tint: #141a40;
  --surface: #171d44;
  --surface-2: #1d2552;
  --ink: #eef1ff;
  --ink-soft: #9aa6dd;
  --line: rgba(255,255,255,.12);

  --c1: #43e7c4;   /* mint */
  --c2: #9b6cff;   /* purple */
  --c3: #ffc24d;   /* amber */
  --c4: #ff6fa5;   /* pink */
  --c5: #54c7ff;   /* azure */
  --primary: #7c4dff;   /* purple accent (AA: ~4.8:1 with white) */
  --on-primary: #ffffff;

  --sky-top: #0a0e2c;
  --sky-bot: #1a2256;
  --hill-back: #2a2f72;
  --hill-mid: #3a2f86;
  --hill-front: #4a2f9a;
  --sun: #c4b0ff;   /* lavender moon-glow, tuned to the purple accent */

  --glow: 0 0 40px rgba(124,77,255,.5);
}

/* ============================================================
   DIRECTION 3 — WOOL & PAPER (cream paper-craft pastels)
   ============================================================ */
[data-direction="paper"] {
  --bg: #f6eedf;
  --bg-tint: #efe3cd;
  --surface: #fffaf0;
  --surface-2: #f3e8d4;
  --ink: #3a3026;
  --ink-soft: #8a7a64;
  --line: rgba(58,48,38,.12);

  --c1: #d9774b;   /* terracotta */
  --c2: #88a06a;   /* sage */
  --c3: #e0ad4a;   /* mustard */
  --c4: #c2543f;   /* clay red */
  --c5: #6f93b0;   /* dusty blue */
  --primary: #cc3a2e;   /* red accent (AA: ~5:1 with the cream on-primary) */
  --on-primary: #fffaf0;

  --sky-top: #f5d9a8;
  --sky-bot: #fbeed3;
  --hill-back: #cdbf95;
  --hill-mid: #a9b07a;
  --hill-front: #88a06a;
  --sun: #e7a84a;

  --glow: 0 0 0 rgba(0,0,0,0);
}

/* -------- density variants -------- */
[data-density="compact"] {
  --section-pad: clamp(52px, 8vh, 90px);
  --card-pad: 24px;
  --stack: 16px;
}
[data-density="comfy"] {
  --section-pad: clamp(96px, 15vh, 180px);
  --card-pad: 38px;
  --stack: 30px;
}

/* ============================================================
   Layout primitives
   ============================================================ */
.wrap { width: 100%; max-width: var(--maxw); margin: 0 auto; padding-inline: var(--gutter); }
section { position: relative; }
.section-pad { padding-block: var(--section-pad); }

.eyebrow {
  display: inline-flex; align-items: center; gap: 9px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 13px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--primary);
}
.eyebrow::before {
  content: ""; width: 22px; height: 22px; flex: none;
  background: currentColor;
  -webkit-mask: var(--sheep-glyph) center/contain no-repeat;
  mask: var(--sheep-glyph) center/contain no-repeat;
  opacity: .9;
}

h1, h2, h3 { font-family: var(--font-display); font-weight: 600; line-height: 1.02; margin: 0; letter-spacing: -0.02em; }
.h-display { font-size: clamp(40px, 7vw, 86px); line-height: 0.98; }
.h2 { font-size: clamp(30px, 4.6vw, 56px); line-height: 1.0; }
.h3 { font-size: clamp(21px, 2.4vw, 28px); }
p { margin: 0; line-height: 1.62; }
.lead { font-size: clamp(17px, 1.5vw, 21px); color: var(--ink-soft); line-height: 1.6; max-width: 62ch; }
.muted { color: var(--ink-soft); }

.grad-text {
  background: linear-gradient(100deg, var(--c1), var(--c5) 45%, var(--c4));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}

/* -------- buttons -------- */
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--font-display); font-weight: 600;
  font-size: 16px; line-height: 1;
  padding: 16px 24px; border-radius: var(--r-pill);
  border: 0; transition: transform var(--dur) var(--ease), filter var(--dur) var(--ease), box-shadow var(--dur) var(--ease), background var(--dur) var(--ease);
  white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn-primary {
  background: var(--primary); color: var(--on-primary);
  box-shadow: 0 10px 24px -10px color-mix(in srgb, var(--primary) 70%, transparent), var(--glow);
}
.btn-primary:hover { filter: brightness(1.05); transform: translateY(-2px); box-shadow: 0 16px 30px -12px color-mix(in srgb, var(--primary) 80%, transparent), var(--glow); }
.btn-ghost {
  background: transparent; color: var(--ink);
  box-shadow: inset 0 0 0 2px var(--line);
}
.btn-ghost:hover { box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--ink) 35%, transparent); transform: translateY(-2px); }
.btn .arr { transition: transform var(--dur) var(--ease); }
.btn:hover .arr { transform: translateX(3px); }

/* -------- cards -------- */
.card {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: var(--card-pad);
  box-shadow: var(--shadow-card);
  transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  position: relative;
}
.card-hover:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }

/* chip / tag */
.chip {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 13px; font-weight: 600; font-family: var(--font-display);
  padding: 7px 13px; border-radius: var(--r-pill);
  background: color-mix(in srgb, var(--primary) 16%, transparent);
  /* ink-weighted so the label clears WCAG AA on the light themes too */
  color: color-mix(in srgb, var(--ink) 62%, var(--primary));
}

/* -------- reveal on scroll -------- */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity .7s var(--ease), transform .7s var(--ease); }
.reveal.in { opacity: 1; transform: none; }
.reveal.d1 { transition-delay: .08s; }
.reveal.d2 { transition-delay: .16s; }
.reveal.d3 { transition-delay: .24s; }
.reveal.d4 { transition-delay: .32s; }
@media (prefers-reduced-motion: reduce) {
  .reveal { opacity: 1; transform: none; transition: none; }
  html { scroll-behavior: auto; }
  /* disable the perpetual bob loop everywhere it's used */
  .hero-float-blob, .mission-blob, .team-ava-ring, .contact-blob, .contact-done-mark { animation: none !important; }
  .lowpoly g { animation: none !important; }
}

/* faceted low-poly svg fills crisp edges */
.lowpoly svg { display: block; width: 100%; height: 100%; }
.lowpoly polygon { shape-rendering: geometricPrecision; }

/* floating sheep bob */
@keyframes bob { 0%,100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-12px) rotate(1deg); } }

/* image-slot placeholder defaults */
.image-slot { background: var(--surface-2); }

/* selection */
::selection { background: color-mix(in srgb, var(--primary) 30%, transparent); }

/* ============ image placeholder (drop-in slot, empty state) ============ */
.image-slot {
  position: relative; display: block; overflow: hidden;
  font: 13px/1.3 system-ui, -apple-system, sans-serif; color: var(--ink-soft);
}
.image-slot .is-inner {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 6px; text-align: center;
  padding: 12px; box-sizing: border-box;
}
.image-slot .is-inner svg { opacity: .45; }
.image-slot .is-cap { max-width: 90%; font-weight: 500; letter-spacing: .01em; }
.image-slot .is-ring {
  position: absolute; inset: 0; pointer-events: none;
  border: 1.5px dashed color-mix(in srgb, var(--ink) 25%, transparent);
}

/* ============ NAV ============ */
.nav { position: sticky; top: 0; z-index: 50; transition: background var(--dur) var(--ease), box-shadow var(--dur) var(--ease), backdrop-filter var(--dur); }
.nav-solid { background: color-mix(in srgb, var(--bg) 82%, transparent); backdrop-filter: blur(12px); box-shadow: 0 1px 0 var(--line); }
.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 76px; gap: 18px; }
.brand { display: inline-flex; align-items: center; gap: 11px; font-family: var(--font-display); font-weight: 600; }
.brand-mark { display: inline-flex; filter: drop-shadow(0 4px 10px rgba(20,30,50,.18)); }
.brand-name { font-size: 19px; line-height: 1; letter-spacing: -0.01em; }
.brand-sub { display: block; font-size: 11px; letter-spacing: .28em; text-transform: uppercase; color: var(--ink-soft); font-weight: 600; margin-top: 3px; }
.nav-links { display: flex; gap: 28px; }
.nav-links a { font-weight: 500; font-size: 15px; color: var(--ink-soft); transition: color var(--dur); position: relative; white-space: nowrap; }
.nav-links a:hover { color: var(--ink); }
.nav-links a::after { content: ""; position: absolute; left: 0; bottom: -6px; height: 2px; width: 0; background: var(--primary); border-radius: 2px; transition: width var(--dur) var(--ease); }
.nav-links a:hover::after { width: 100%; }
.nav-cta { display: flex; align-items: center; gap: 12px; }
.nav-btn { padding: 12px 20px; font-size: 15px; }
.nav-burger { display: none; flex-direction: column; gap: 5px; background: none; border: 0; padding: 8px; }
.nav-burger span { width: 24px; height: 2.5px; background: var(--ink); border-radius: 2px; }
.nav-drawer { display: none; }

/* ============ HERO shared ============ */
.hero-h1 { margin-top: 18px; }
.hero-lead { margin-top: 22px; }
.hero-ctas { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 32px; }
.hero-mini-stats { display: flex; gap: 34px; margin-top: 40px; flex-wrap: wrap; }
.hero-mini-stats > div { display: flex; flex-direction: column; }
.hero-mini-stats b { font-family: var(--font-display); font-size: 30px; line-height: 1; color: var(--ink); }
.hero-mini-stats span { font-size: 13px; color: var(--ink-soft); margin-top: 5px; letter-spacing: .02em; }

/* split hero */
.hero-split { padding-top: 48px; padding-bottom: var(--section-pad); }
.hero-split-grid { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: clamp(30px, 5vw, 70px); align-items: center; }
.hero-media { position: relative; }
.hero-frame { position: relative; border-radius: var(--r-xl); overflow: hidden; aspect-ratio: 4/3.4; box-shadow: var(--shadow-hover); background: var(--surface-2); }
.hero-frame-badge { position: absolute; top: 16px; left: 16px; display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: .04em; text-transform: uppercase; color: #fff; background: rgba(20,28,42,.6); padding: 8px 13px; border-radius: var(--r-pill); backdrop-filter: blur(4px); white-space: nowrap; }
.hero-frame-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--c2); box-shadow: 0 0 10px var(--c2); }
.hero-float-blob { position: absolute; right: -22px; bottom: -26px; animation: bob 5s var(--ease) infinite; filter: drop-shadow(0 12px 24px rgba(20,30,50,.25)); }

/* stage hero */
.hero-stage { min-height: 92vh; display: flex; align-items: flex-end; overflow: hidden; }
.hero-stage-bg { position: absolute; inset: 0; z-index: 0; }
.hero-stage-bg .lowpoly, .hero-stage-bg svg { height: 100%; }
.hero-stage-scrim { position: absolute; inset: 0; z-index: 1; background: linear-gradient(90deg, rgba(10,16,30,.72) 0%, rgba(10,16,30,.35) 45%, transparent 75%); }
.hero-stage-inner { position: relative; z-index: 2; color: #fff; padding-bottom: clamp(60px, 10vh, 120px); padding-top: 120px; max-width: 760px; }
.hero-stage-inner .hero-h1, .hero-stage-inner .hero-lead { color: #fff; }
.hero-stage-inner .hero-lead { color: rgba(255,255,255,.86); }

/* showcase hero */
.hero-showcase { padding-top: 40px; }
.hero-showcase-grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(28px, 4vw, 56px); align-items: center; margin-top: 30px; }
.hero-showcase-media { aspect-ratio: 4/3; border-radius: var(--r-xl); overflow: hidden; box-shadow: var(--shadow-hover); }

/* ============ section heads ============ */
.sec-head { max-width: 760px; margin-bottom: 56px; }
.sec-head.center { margin-inline: auto; text-align: center; }
.sec-head.center .lead { margin-inline: auto; }
.sec-head .h2 { margin-top: 16px; }
.sec-head .lead { margin-top: 20px; }
.sec-head.row { display: flex; justify-content: space-between; align-items: flex-end; gap: 40px; max-width: none; }
.sec-head.row .lead { max-width: 42ch; }

/* ============ SERVICES ============ */
.svc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
.svc-card { display: flex; flex-direction: column; gap: 14px; }
.svc-icon { width: 56px; height: 56px; border-radius: 18px; display: grid; place-items: center; background: color-mix(in srgb, var(--primary) 14%, transparent); color: var(--primary); }
.svc-icon i, .svc-icon svg { width: 28px; height: 28px; }
.svc-card h3 { margin-top: 4px; }

/* ============ PORTFOLIO ============ */
.work-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 26px; }
.work-card { padding: 0; overflow: hidden; display: flex; flex-direction: column; }
.work-media { position: relative; aspect-ratio: 16/10; }
.work-media .image-slot { width: 100%; height: 100%; }
.work-tag { position: absolute; top: 16px; left: 16px; background: color-mix(in srgb, var(--surface) 88%, transparent); backdrop-filter: blur(4px); color: var(--ink); box-shadow: var(--shadow-card); }
.work-body { padding: var(--card-pad); display: flex; flex-direction: column; gap: 12px; }
.work-metric { display: flex; align-items: baseline; gap: 10px; }
.work-metric b { font-family: var(--font-display); font-size: clamp(40px, 5vw, 58px); line-height: 0.9; }
.work-metric span { font-size: 14px; color: var(--ink-soft); }
.work-body h3 { margin-top: 2px; }
.work-cats { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
.work-cat { font-size: 12.5px; font-weight: 600; font-family: var(--font-display); padding: 6px 12px; border-radius: var(--r-pill); background: var(--surface-2); color: var(--ink-soft); }

/* ============ STATS ============ */
.stats-sec { background: var(--bg-tint); position: relative; }
.stats-band-top { position: absolute; top: -1px; left: 0; right: 0; line-height: 0; }
.stats-inner { padding-block: var(--section-pad); }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 26px; margin-top: 20px; }
.stat { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; padding: 20px; }
.stat-n { font-family: var(--font-display); font-size: clamp(48px, 6vw, 76px); line-height: 0.9; }
.stat-l { font-family: var(--font-display); font-weight: 600; font-size: 17px; color: var(--ink); }
.stat-sub { font-size: 13px; }

/* ============ MISSION ============ */
.mission-grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(36px, 6vw, 80px); align-items: start; }
.mission-lead { position: relative; }
.mission-lead .h2 { margin-top: 16px; }
.mission-lead .lead { margin-top: 22px; }
.mission-blob { margin-top: 36px; animation: bob 6s var(--ease) infinite; filter: drop-shadow(0 14px 30px rgba(20,30,50,.22)); }
.mission-points { display: flex; flex-direction: column; gap: 14px; padding-top: 8px; }
.mission-point { display: flex; gap: 20px; padding: 26px; border-radius: var(--r-lg); background: var(--surface); box-shadow: var(--shadow-card); transition: transform var(--dur) var(--ease); }
.mission-point:hover { transform: translateX(6px); }
.mp-num { font-family: var(--font-display); font-weight: 600; font-size: 22px; color: var(--primary); flex: none; }
.mission-point h3 { font-size: 21px; }
.mission-point p { margin-top: 8px; }

/* ============ TEAM ============ */
.team-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 22px; }
.team-card { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; }
.team-ava { position: relative; width: 140px; height: 140px; display: grid; place-items: center; margin-bottom: 10px; }
.team-ava-ring { position: absolute; right: -6px; bottom: -2px; z-index: 2; animation: bob 4.6s var(--ease) infinite; filter: drop-shadow(0 4px 9px rgba(20,40,70,.22)); }
.team-ava .image-slot { position: relative; z-index: 1; border: 4px solid var(--surface); border-radius: 50%; box-shadow: var(--shadow-card); }
.team-name { font-family: var(--font-display); font-weight: 600; font-size: 17px; }
.team-role { font-size: 13.5px; }

/* ============ JOURNAL ============ */
.journal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
.journal-card { display: flex; flex-direction: column; gap: 13px; align-items: flex-start; }
.journal-card h3 { font-size: 22px; }
.journal-soon { margin-top: auto; font-family: var(--font-display); font-weight: 600; font-size: 12.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-soft); padding-top: 8px; }

/* ============ CONTACT ============ */
.contact-plate { --fg2: rgba(255,255,255,.82); display: grid; grid-template-columns: 0.85fr 1.15fr; gap: clamp(30px, 4vw, 60px); background: var(--bg-tint); border-radius: var(--r-xl); padding: clamp(30px, 4vw, 56px); position: relative; overflow: hidden; }
[data-direction="nightfall"] .contact-plate { background: linear-gradient(150deg, var(--surface-2), var(--surface)); box-shadow: inset 0 1px 0 rgba(255,255,255,.06); }
.contact-left { position: relative; }
.contact-left .h2 { margin-top: 14px; }
.contact-left .lead { margin-top: 18px; color: var(--ink-soft); }
.contact-meta { list-style: none; margin: 28px 0 0; padding: 0; display: flex; flex-direction: column; gap: 14px; }
.contact-meta li { display: flex; align-items: center; gap: 12px; font-weight: 500; color: var(--ink); }
.contact-meta i, .contact-meta svg { width: 20px; height: 20px; color: var(--primary); }
.contact-blob { position: absolute; right: -30px; bottom: -38px; opacity: .92; animation: bob 6.5s var(--ease) infinite; pointer-events: none; filter: drop-shadow(0 10px 20px rgba(20,40,70,.18)); }

.contact-right { position: relative; z-index: 1; }
.contact-form { background: var(--surface); border-radius: var(--r-lg); padding: clamp(22px, 3vw, 34px); display: flex; flex-direction: column; gap: 16px; box-shadow: var(--shadow-card); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.field { display: flex; flex-direction: column; gap: 7px; }
.field-label { font-family: var(--font-display); font-weight: 600; font-size: 13.5px; color: var(--ink); }
.field-label .req { color: var(--c4); font-style: normal; margin-left: 3px; }
.field input, .field select, .field textarea {
  font-family: var(--font-body); font-size: 15.5px; color: var(--ink);
  background: var(--surface-2); border: 2px solid transparent; border-radius: var(--r-sm);
  padding: 13px 15px; width: 100%; transition: border-color var(--dur), background var(--dur); resize: vertical;
}
.field input::placeholder, .field textarea::placeholder { color: color-mix(in srgb, var(--ink-soft) 80%, transparent); }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 30%, transparent); }
:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
.field-err input, .field-err textarea { border-color: var(--c4); }
.field-msg { font-size: 12.5px; color: var(--c4); font-weight: 500; }
.contact-submit { margin-top: 6px; justify-content: center; }
.contact-fine { font-size: 12.5px; text-align: center; }

.contact-done { background: var(--surface); border-radius: var(--r-lg); padding: clamp(34px, 5vw, 54px); text-align: center; display: flex; flex-direction: column; align-items: center; gap: 14px; box-shadow: var(--shadow-card); min-height: 100%; justify-content: center; }
.contact-done-mark { animation: bob 4s var(--ease) infinite; }
.contact-done p { max-width: 40ch; }
.contact-done .btn { margin-top: 12px; }

/* ============ FOOTER ============ */
.footer { background: #11182b; color: #fff; padding-top: 72px; position: relative; z-index: 1; }
[data-direction="paper"] .footer { background: #2a2218; }
.footer-inner { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 40px; padding-bottom: 56px; }
.brand-foot .brand-name { color: #fff; }
.brand-foot .brand-sub { color: rgba(255,255,255,.6); }
.footer-tag { margin-top: 18px; max-width: 42ch; color: rgba(255,255,255,.7); line-height: 1.6; }
.footer-col { display: flex; flex-direction: column; gap: 13px; }
.footer-h { font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.5); margin-bottom: 4px; }
.footer-col a { color: rgba(255,255,255,.82); transition: color var(--dur); }
.footer-col a:hover { color: #fff; }
.footer-bar { line-height: 0; }
.footer-legal { display: flex; justify-content: space-between; gap: 20px; padding-block: 24px; font-size: 13px; color: rgba(255,255,255,.55); flex-wrap: wrap; }

/* ============ FLOCK MINIGAME (cursor-herding sheep + food) ============ */
main { position: relative; z-index: 1; }
/* The play layer floats over the page but never eats clicks — only the
   controls do. It lives on <body> (outside #root) so it survives re-renders. */
#flock-game { position: fixed; inset: 0; z-index: 30; pointer-events: none; overflow: hidden; }
.flock-unit { position: absolute; top: 0; left: 0; will-change: transform; filter: drop-shadow(0 8px 12px rgba(20,40,70,.20)); }
.flock-unit-face { will-change: transform; transform-origin: 50% 72%; }
.flock-unit-face svg { display: block; }
.flock-unit.poof { animation: flockPoof .32s var(--ease) forwards; }
@keyframes flockPoof { to { transform: scale(.2) translateY(-14px); opacity: 0; } }
.flock-food { position: absolute; top: 0; left: 0; will-change: transform, opacity; transform-origin: 50% 90%; animation: flockFoodIn .28s var(--ease); }
.flock-food svg { display: block; }
@keyframes flockFoodIn { from { transform: translateY(8px) scale(.4); opacity: 0; } }

/* control cluster (bottom-right) */
.flock-ctl { position: fixed; right: 18px; bottom: 18px; z-index: 48; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.flock-fab { position: relative; width: 58px; height: 58px; border-radius: 50%; border: 0;
  background: var(--primary); color: var(--on-primary); display: grid; place-items: center; pointer-events: auto;
  box-shadow: 0 12px 28px -8px color-mix(in srgb, var(--primary) 70%, transparent), 0 4px 10px rgba(0,0,0,.18), var(--glow);
  transition: transform .15s var(--ease), filter .15s var(--ease); }
.flock-fab:hover { transform: translateY(-2px) scale(1.05); filter: brightness(1.06); }
.flock-fab:active { transform: scale(.94); }
.flock-fab > svg { width: 36px; height: auto; pointer-events: none; }
.flock-fab .flock-plus { position: absolute; right: 5px; bottom: 4px; width: 19px; height: 19px; border-radius: 50%;
  background: var(--on-primary); color: var(--primary); font: 700 15px/19px var(--font-display); text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.25); }
.flock-count { position: absolute; top: -5px; left: -5px; min-width: 21px; height: 21px; padding: 0 5px; border-radius: 999px;
  background: var(--ink); color: var(--bg); font: 700 11px/21px var(--font-display); text-align: center; display: none; box-shadow: 0 2px 6px rgba(0,0,0,.25); }
.flock-count[data-show="1"] { display: block; }
.flock-clear { width: 40px; height: 40px; border-radius: 50%; border: 0; pointer-events: auto;
  background: color-mix(in srgb, var(--ink) 10%, var(--surface)); color: var(--ink); display: none; place-items: center;
  box-shadow: var(--shadow-card); transition: transform .15s var(--ease), background .15s; }
.flock-clear[data-show="1"] { display: grid; }
.flock-clear:hover { transform: translateY(-2px); background: color-mix(in srgb, var(--ink) 18%, var(--surface)); }
.flock-clear svg { width: 19px; height: 19px; }

/* one-time discovery hint */
.flock-hint { position: fixed; right: 88px; bottom: 24px; z-index: 48; max-width: 230px; display: none;
  align-items: flex-start; gap: 8px; padding: 11px 12px; border-radius: 14px 14px 4px 14px;
  background: var(--surface); color: var(--ink); box-shadow: var(--shadow-hover); border: 1px solid var(--line);
  font: 500 13px/1.4 var(--font-body); animation: flockFoodIn .3s var(--ease); }
.flock-hint[data-show="1"] { display: flex; }
.flock-hint b { font-family: var(--font-display); }
.flock-hint-x { flex: none; appearance: none; border: 0; background: transparent; color: var(--ink-soft); width: 18px; height: 18px; border-radius: 5px; font-size: 12px; line-height: 1; }
.flock-hint-x:hover { background: color-mix(in srgb, var(--ink) 10%, transparent); color: var(--ink); }
@media (max-width: 560px) { .flock-hint { max-width: 180px; right: 78px; } }

/* ============ RESPONSIVE ============ */
@media (max-width: 1040px) {
  .svc-grid, .journal-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }

  .mission-grid { grid-template-columns: 1fr; }
  .footer-inner { grid-template-columns: 1fr 1fr; }
  .footer-brand { grid-column: 1 / -1; }
}
@media (max-width: 860px) {
  .nav-links, .nav-btn { display: none; }
  .nav-burger { display: flex; }
  .nav-drawer { display: flex; flex-direction: column; gap: 16px; padding: 18px var(--gutter) 26px; background: var(--bg); box-shadow: 0 12px 24px -12px rgba(20,30,50,.3); }
  .nav-drawer a { font-family: var(--font-display); font-weight: 600; font-size: 18px; }
  .hero-split-grid, .hero-showcase-grid { grid-template-columns: 1fr; }
  .hero-media { order: -1; max-width: 520px; }
  .work-grid { grid-template-columns: 1fr; }
  .contact-plate { grid-template-columns: 1fr; }
  .sec-head.row { flex-direction: column; align-items: flex-start; gap: 18px; }
}
@media (max-width: 560px) {
  .svc-grid, .journal-grid, .team-grid, .stats-grid { grid-template-columns: 1fr; }
  .team-grid { grid-template-columns: repeat(2, 1fr); }
  .field-row { grid-template-columns: 1fr; }
  .footer-inner { grid-template-columns: 1fr; }
  .hero-mini-stats { gap: 22px; }
}

/* ============ LIGHT / DARK TOGGLE ============ */
.mode-toggle { display: inline-grid; place-items: center; width: 42px; height: 42px; flex: none;
  border-radius: 50%; border: 1px solid var(--line); background: color-mix(in srgb, var(--surface) 70%, transparent);
  color: var(--ink); transition: transform .2s var(--ease), background .2s var(--ease), color .2s var(--ease); }
.mode-toggle:hover { transform: translateY(-1px); background: var(--surface); color: var(--primary); }
.mode-toggle svg { width: 20px; height: 20px; }
.nav-drawer .mode-toggle { width: 100%; border-radius: var(--r-pill); gap: 10px; height: 48px; font-family: var(--font-display); font-weight: 600; }
.nav-drawer .mode-toggle .mode-label { display: inline; }
.mode-toggle .mode-label { display: none; }

/* ============ JOURNAL read button ============ */
.journal-read {
  margin-top: auto; padding-top: 10px; background: none; border: 0;
  font-family: var(--font-display); font-weight: 600; font-size: 14.5px; color: var(--primary);
  display: inline-flex; align-items: center; gap: 8px; align-self: flex-start;
}
.journal-read .arr { transition: transform var(--dur) var(--ease); }
.journal-read:hover .arr { transform: translateX(4px); }

/* ============ MODAL (article / info reader) ============ */
.footer-legal a, .footer-col a[data-modal] { cursor: pointer; }
.footer-legal a:hover { color: rgba(255,255,255,.95); text-decoration: underline; }
.modal-scrim {
  position: fixed; inset: 0; z-index: 2147483644;
  background: color-mix(in srgb, var(--ink) 55%, rgba(8,12,24,.65));
  backdrop-filter: blur(6px); display: flex; align-items: flex-start; justify-content: center;
  padding: clamp(16px, 5vh, 70px) 16px; overflow-y: auto;
  animation: modalFade .22s var(--ease);
}
@keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }
.modal-card {
  position: relative; width: 100%; max-width: 680px; margin: auto;
  background: var(--surface); color: var(--ink); border-radius: var(--r-lg);
  padding: clamp(26px, 4vw, 48px); box-shadow: var(--shadow-hover);
  animation: modalRise .28s var(--ease);
}
@keyframes modalRise { from { opacity: 0; transform: translateY(16px) scale(.98); } to { opacity: 1; transform: none; } }
.modal-close {
  position: absolute; top: 14px; right: 14px; width: 36px; height: 36px; border-radius: 50%;
  border: 0; background: var(--surface-2); color: var(--ink-soft); font-size: 16px; line-height: 1;
  display: grid; place-items: center; transition: background var(--dur), color var(--dur), transform var(--dur);
}
.modal-close:hover { background: color-mix(in srgb, var(--primary) 16%, var(--surface-2)); color: var(--ink); transform: rotate(90deg); }
.modal-head { margin-bottom: 22px; padding-right: 36px; display: flex; flex-direction: column; gap: 12px; }
.modal-head .chip { align-self: flex-start; }
.modal-readtime { font-size: 13px; color: var(--ink-soft); font-weight: 500; }
.modal-title { font-family: var(--font-display); font-weight: 600; font-size: clamp(26px, 4vw, 38px); line-height: 1.04; letter-spacing: -0.02em; margin: 0; }
.modal-dek { font-size: 17px; line-height: 1.5; color: var(--ink-soft); margin: 0; }
.modal-body { font-size: 16.5px; line-height: 1.7; color: var(--ink); }
.modal-body > * + * { margin-top: 16px; }
.modal-body h4 { font-family: var(--font-display); font-weight: 600; font-size: 19px; margin-top: 28px; color: var(--ink); }
.modal-body ul, .modal-body ol { margin: 16px 0; padding-left: 22px; display: flex; flex-direction: column; gap: 8px; }
.modal-body li { line-height: 1.55; }
.modal-body a { color: var(--primary); font-weight: 600; text-decoration: underline; text-underline-offset: 2px; }
.modal-body blockquote {
  margin: 22px 0; padding: 14px 20px; border-left: 4px solid var(--primary);
  background: var(--surface-2); border-radius: 0 var(--r-sm) var(--r-sm) 0;
  font-family: var(--font-display); font-size: 18px; font-style: italic; color: var(--ink);
}
@media (prefers-reduced-motion: reduce) { .modal-scrim, .modal-card { animation: none; } .modal-close:hover { transform: none; } }

<body>
<a id="top"></a>
<div id="root"></div>

<!-- icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<script>
"use strict";
/* ============================================================
   Shippy Sheep Studio — vanilla implementation
   Ported from the Claude Design React/JSX prototype.
   ============================================================ */

/* ---------------- color helpers + PRNG ---------------- */
function _hex(c){ c=(c||'').trim().replace('#',''); if(!/^[0-9a-f]{3}([0-9a-f]{3})?$/i.test(c)) return [204,204,204]; if(c.length===3)c=c.split('').map(x=>x+x).join(''); return [parseInt(c.slice(0,2),16),parseInt(c.slice(2,4),16),parseInt(c.slice(4,6),16)]; }
function _toHex(r,g,b){ const h=n=>Math.max(0,Math.min(255,Math.round(n))).toString(16).padStart(2,'0'); return '#'+h(r)+h(g)+h(b); }
function lerpColor(a,b,t){ const A=_hex(a),B=_hex(b); return _toHex(A[0]+(B[0]-A[0])*t, A[1]+(B[1]-A[1])*t, A[2]+(B[2]-A[2])*t); }
function shade(c,amt){ const A=_hex(c); return _toHex(A[0]+255*amt, A[1]+255*amt, A[2]+255*amt); }
function mulberry32(seed){ return function(){ let t=seed+=0x6D2B79F5; t=Math.imul(t^t>>>15,t|1); t^=t+Math.imul(t^t>>>7,t|61); return ((t^t>>>14)>>>0)/4294967296; }; }
function getCSS(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || '#cccccc'; }

/* ---------------- generic rectangular low-poly mesh ---------------- */
function meshTriangles(W,H,cols,rows,jitter,seed){
  const rnd=mulberry32(seed);
  const pts=[];
  for(let r=0;r<=rows;r++){
    pts[r]=[];
    for(let c=0;c<=cols;c++){
      const edgeX = c===0||c===cols, edgeY = r===0||r===rows;
      const jx = edgeX?0:(rnd()-.5)*jitter*(W/cols);
      const jy = edgeY?0:(rnd()-.5)*jitter*(H/rows);
      pts[r][c]={x:(c/cols)*W+jx, y:(r/rows)*H+jy};
    }
  }
  const tris=[];
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const a=pts[r][c],b=pts[r][c+1],d=pts[r+1][c],e=pts[r+1][c+1];
    tris.push({p:[a,b,e], cy:(a.y+b.y+e.y)/3});
    tris.push({p:[a,e,d], cy:(a.y+e.y+d.y)/3});
  }
  return tris;
}

const poly = (pts, fill, extra='') => `<polygon points="${pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')}" fill="${fill}"${extra?' '+extra:''}/>`;

/* ---------------- sheep glyph ---------------- */
const SHEEP_COLORS = {
  white: { wool: '#ffffff', shade: '#dbe6ef', face: '#1f4e79', eye: '#ffffff' },
  sky:   { wool: '#c6e6fb', shade: '#7cc1ee', face: '#2f9ee0', eye: '#ffffff' },
  grass: { wool: '#cbeccf', shade: '#8ed79a', face: '#3da85c', eye: '#ffffff' },
  sun:   { wool: '#ffe7ad', shade: '#ffd166', face: '#e0a32a', eye: '#ffffff' },
  coral: { wool: '#ffd4c8', shade: '#ffa28c', face: '#ff7a5c', eye: '#ffffff' },
  plum:  { wool: '#e0d6ff', shade: '#b39bff', face: '#8a6cff', eye: '#ffffff' },
  navy:  { wool: '#1f4e79', shade: '#3a6da0', face: '#0f2c49', eye: '#ffffff' },
};
const SHEEP_KEYS = ['sky', 'grass', 'sun', 'coral', 'plum', 'white'];

/* fluffy, cute sheep head (the brand sheep) centered at cx,cy */
function sheepPolys(cx, cy, r, c){
  const f = (n) => n.toFixed(2);
  const circle = (x, y, rad, fill) => `<circle cx="${f(x)}" cy="${f(y)}" r="${f(rad)}" fill="${fill}"/>`;
  const ellipse = (x, y, rx, ry, fill, rot=0) =>
    `<ellipse cx="${f(x)}" cy="${f(y)}" rx="${f(rx)}" ry="${f(ry)}" fill="${fill}"${rot ? ` transform="rotate(${rot} ${f(x)} ${f(y)})"` : ''}/>`;

  // dark pupil that reads on the white sclera, regardless of theme
  const pupil = '#23303d';
  const parts = [];

  // ears — tucked behind the wool, peeking at the sides
  parts.push(ellipse(cx - r*0.66, cy + r*0.30, r*0.20, r*0.30, c.face, 28));
  parts.push(ellipse(cx + r*0.66, cy + r*0.30, r*0.20, r*0.30, c.face, -28));

  // fluffy wool — a ring of soft bumps + a solid core to fill the gaps
  const N = 11;
  for (let i = 0; i < N; i++){
    const a = (i / N) * Math.PI * 2 - Math.PI / 2;
    const bx = cx + Math.cos(a) * r * 0.74;
    const by = cy + Math.sin(a) * r * 0.74 - r * 0.06;
    parts.push(circle(bx, by, r * (0.40 + (i % 2 ? 0.05 : 0)), i % 3 === 1 ? c.shade : c.wool));
  }
  parts.push(circle(cx, cy - r*0.06, r*0.74, c.wool));

  // soft rounded face nestled in the wool
  parts.push(ellipse(cx, cy + r*0.24, r*0.50, r*0.46, c.face));

  // wool fringe flopping over the forehead (the cute bit)
  parts.push(circle(cx,          cy - r*0.16, r*0.30, c.wool));
  parts.push(circle(cx - r*0.28, cy - r*0.04, r*0.21, c.shade));
  parts.push(circle(cx + r*0.28, cy - r*0.04, r*0.21, c.wool));

  // big cute eyes: white sclera + dark pupil + a little catchlight
  [-1, 1].forEach((s) => {
    const ex = cx + s * r*0.20, ey = cy + r*0.18;
    parts.push(circle(ex, ey, r*0.165, c.eye));
    parts.push(circle(ex, ey + r*0.02, r*0.095, pupil));
    parts.push(circle(ex - r*0.03, ey - r*0.03, r*0.035, '#ffffff'));
  });

  // tiny nose
  parts.push(ellipse(cx, cy + r*0.50, r*0.10, r*0.07, pupil));

  return parts.join('');
}

/* the fluffy sheep head — the single sheep shape used everywhere (logo, blobs, badges) */
function FacetSheep(color='white', size=64, style=''){
  const c = typeof color === 'string' ? (SHEEP_COLORS[color] || SHEEP_COLORS.white) : color;
  return `<svg width="${size}" height="${size}" viewBox="0 0 64 64"${style?' style="'+style+'"':''} aria-hidden="true">${sheepPolys(32,32,25,c)}</svg>`;
}

/* side-profile fluffy sheep for the wandering flock. Drawn facing RIGHT;
   flip with scaleX(-1) to face left. viewBox 0 0 64 50. */
function sheepSidePolys(c){
  const f = (n) => n.toFixed(2);
  const circle = (x, y, rad, fill) => `<circle cx="${f(x)}" cy="${f(y)}" r="${f(rad)}" fill="${fill}"/>`;
  const ellipse = (x, y, rx, ry, fill, rot=0) =>
    `<ellipse cx="${f(x)}" cy="${f(y)}" rx="${f(rx)}" ry="${f(ry)}" fill="${fill}"${rot ? ` transform="rotate(${rot} ${f(x)} ${f(y)})"` : ''}/>`;
  const pupil = '#23303d';
  const p = [];

  // legs (behind the body)
  [20, 27, 38, 45].forEach((lx) => p.push(`<rect x="${lx}" y="33" width="5" height="15" rx="2.5" fill="${c.face}"/>`));
  // tail puff
  p.push(circle(12, 25, 5, c.shade));
  // fluffy body — ring of bumps + filled core
  const bx = 29, by = 26, rx = 16, ry = 10.5, N = 8;
  for (let i = 0; i < N; i++){
    const a = (i / N) * Math.PI * 2;
    p.push(circle(bx + Math.cos(a) * rx, by + Math.sin(a) * ry, 8.5, i % 3 === 1 ? c.shade : c.wool));
  }
  p.push(ellipse(bx, by, rx - 1, ry + 1, c.wool));
  // head

  p.push(ellipse(52, 27, 8, 7, c.face));        // face
  p.push(circle(49, 14, 4.2, c.wool));          // forelock tuft

  p.push(circle(55, 25, 2.5, c.eye));

/* ---------------- HERO low-poly landscape ---------------- */
function LowPolyScene(direction, variant){
  const v = getComputedStyle(document.documentElement);
  const skyTop = v.getPropertyValue('--sky-top').trim() || '#9ed8ff';
  const skyBot = v.getPropertyValue('--sky-bot').trim() || '#e8f7ff';
  const hillBack = v.getPropertyValue('--hill-back').trim() || '#9fd6a4';
  const hillMid = v.getPropertyValue('--hill-mid').trim() || '#66c478';
  const hillFront = v.getPropertyValue('--hill-front').trim() || '#3da85c';
  const sunC = v.getPropertyValue('--sun').trim() || '#ffd24a';

  const W = 1000, H = 760;
  const rnd = mulberry32(variant === 'facets' ? 99 : 7);

  // SKY mesh
  const sky = meshTriangles(W, H * 0.72, 9, 6, 0.55, 11).map((t) => {
    const tt = t.cy / (H * 0.72);
    let col = lerpColor(skyTop, skyBot, tt);
    col = shade(col, (rnd() - 0.5) * 0.05);
    return { pts: t.p.map(pt => [pt.x, pt.y]), fill: col };
  });

  // SUN (low-poly disc)
  const sunCx = W * (variant === 'facets' ? 0.5 : 0.74), sunCy = H * 0.2, sunR = 88;
  const sunSides = 11, sunPts = [];
  for (let i = 0; i < sunSides; i++){
    const a = (i / sunSides) * Math.PI * 2 - Math.PI / 2;
    const rr = sunR * (0.9 + rnd() * 0.18);
    sunPts.push([sunCx + Math.cos(a) * rr, sunCy + Math.sin(a) * rr]);
  }
  let sunTris = '';
  for (let i = 0; i < sunSides; i++){
    sunTris += poly([[sunCx, sunCy], sunPts[i], sunPts[(i + 1) % sunSides]], shade(sunC, (i % 2 ? 0.04 : -0.03)));
  }

  // ridge generator -> faceted band
  function hillBand(baseY, amp, segments, color, seed, rows = 2, bottom = H){
    const r = mulberry32(seed);
    const ridge = [];
    for (let i = 0; i <= segments; i++){
      const x = (i / segments) * W;
      const y = baseY + Math.sin(i * 1.3 + seed) * amp * (0.5 + r() * 0.7) - r() * amp * 0.4;
      ridge.push({ x, y });
    }
    let tris = '';
    for (let i = 0; i < segments; i++){
      const x0 = ridge[i].x, x1 = ridge[i + 1].x;
      const yTop0 = ridge[i].y, yTop1 = ridge[i + 1].y;
      for (let rr = 0; rr < rows; rr++){
        const ya0 = yTop0 + (bottom - yTop0) * (rr / rows);
        const ya1 = yTop1 + (bottom - yTop1) * (rr / rows);
        const yb0 = yTop0 + (bottom - yTop0) * ((rr + 1) / rows);
        const yb1 = yTop1 + (bottom - yTop1) * ((rr + 1) / rows);
        const f0 = shade(color, (r() - 0.5) * 0.10 + (rr * -0.02));
        const f1 = shade(color, (r() - 0.5) * 0.10 + (rr * -0.02));
        tris += poly([[x0, ya0],[x1, ya1],[x1, yb1]], f0);
        tris += poly([[x0, ya0],[x1, yb1],[x0, yb0]], f1);
      }
    }
    return tris;
  }

  const backHills = hillBand(H * 0.50, 46, 7, hillBack, 3, 1);
  const midHills = hillBand(H * 0.60, 60, 8, hillMid, 17, 2);
  const frontHills = hillBand(H * 0.72, 70, 9, hillFront, 29, 2);

  const skyStr = sky.map(t => poly(t.pts, t.fill)).join('');
  const glow = direction === 'nightfall'
    ? `<defs><filter id="sceneGlow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`
    : '';
  const sunGroup = `<g${direction === 'nightfall' ? ' filter="url(#sceneGlow)"' : ''}>${sunTris}</g>`;

  return `<div class="lowpoly" style="width:100%;height:100%">`
    + `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMax slice" role="img" aria-label="Stylized low-poly landscape">`
    + glow + skyStr + sunGroup + backHills + midHills + frontHills
    + FlockSheep(W, H, direction)
    + `</svg></div>`;
}

/* tiny faceted sheep that sit on the hill */
function FlockSheep(W, H, direction){
  const spots = [
    { x: W * 0.22, y: H * 0.80, s: 1.15 },
    { x: W * 0.50, y: H * 0.86, s: 1.5 },
    { x: W * 0.78, y: H * 0.81, s: 1.0 },
  ];
  const wool = direction === 'nightfall' ? '#f3f0ff' : '#ffffff';
  const woolShade = direction === 'nightfall' ? '#cdc6f0' : '#dfe7ee';
  const face = direction === 'nightfall' ? '#2a2f72' : '#3a4a5c';
  return spots.map((sp, i) =>
    `<g transform="translate(${sp.x} ${sp.y}) scale(${sp.s})" style="transform-origin:center;animation:bob ${3 + i * 0.6}s var(--ease) ${i * 0.3}s infinite">`
    + `<rect x="-12" y="6" width="5" height="14" rx="2" fill="${face}"/>`
    + `<rect x="7" y="6" width="5" height="14" rx="2" fill="${face}"/>`
    + `<polygon points="-20,-4 -4,-16 0,2" fill="${wool}"/>`
    + `<polygon points="-4,-16 12,-14 0,2" fill="${woolShade}"/>`
    + `<polygon points="12,-14 22,0 0,2" fill="${wool}"/>`
    + `<polygon points="-20,-4 0,2 -8,10" fill="${woolShade}"/>`
    + `<polygon points="0,2 22,0 14,10" fill="${wool}"/>`
    + `<polygon points="-8,10 0,2 14,10" fill="${woolShade}"/>`
    + `<polygon points="16,-12 30,-12 23,2" fill="${face}"/>`
    + `<polygon points="14,-14 20,-18 22,-10" fill="${face}"/>`
    + `<circle cx="25" cy="-6" r="1.6" fill="${wool}"/>`
    + `</g>`
  ).join('');
}

/* ---------------- decorative faceted band ---------------- */
function FacetBand(color, flip, height = 90){
  const W = 1000, H = height;
  const r = mulberry32(color.length * 13 + (flip ? 5 : 0));
  const seg = 10, pts = [];
  for (let i = 0; i <= seg; i++) pts.push({ x: (i / seg) * W, y: H * 0.5 + (r() - 0.5) * H * 0.8 });
  let tris = '';
  for (let i = 0; i < seg; i++){
    const top = flip ? 0 : H, ya = pts[i].y, yb = pts[i + 1].y;
    tris += poly([[pts[i].x, ya],[pts[i + 1].x, yb],[pts[i + 1].x, top]], shade(color, (r() - 0.5) * 0.08));
    tris += poly([[pts[i].x, ya],[pts[i + 1].x, top],[pts[i].x, top]], shade(color, (r() - 0.5) * 0.08));
  }
  return `<div class="lowpoly" style="width:100%;height:${height}px;line-height:0">`
    + `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${tris}</svg></div>`;
}

/* ---------------- procedural low-poly art (fills the image slots) ---------------- */
/* A seeded low-poly vignette: faceted sky, a low-poly sun, layered hills, and a
   motif that distinguishes each tile. Recolours itself to the active theme. */
function procScene(seed, accentName, motif){
  const cv = getComputedStyle(document.documentElement);
  const get = (n, d) => (cv.getPropertyValue(n).trim() || d);
  const dir = document.documentElement.getAttribute('data-direction');
  const night = dir === 'nightfall', paper = dir === 'paper';
  const acc = get(accentName, get('--primary', '#7f8a99'));
  const W = 120, H = 90;
  const rnd = mulberry32(seed);
  const skyTop = night ? shade(acc, -0.60) : lerpColor(acc, '#ffffff', 0.52);
  const skyBot = night ? shade(acc, -0.42) : lerpColor(acc, '#ffffff', 0.86);

  let sky = '';
  meshTriangles(W, H * 0.72, 6, 4, 0.5, seed + 3).forEach((t) => {
    const tt = t.cy / (H * 0.72);
    sky += poly(t.p.map(p => [p.x, p.y]), shade(lerpColor(skyTop, skyBot, tt), (rnd() - 0.5) * 0.05));
  });

  // low-poly sun / moon
  const sx = W * (0.18 + rnd() * 0.6), sy = H * (0.18 + rnd() * 0.12), sr = 11 + rnd() * 5;
  // paper's mustard sun vanishes on cream — use the warmer clay accent there
  const sunCol = night ? get('--sun', acc) : (paper ? get('--c4', '#c2543f') : get('--c3', '#ffc23d'));
  let sun = '';
  const sides = 9;
  for (let i = 0; i < sides; i++){
    const a0 = (i / sides) * Math.PI * 2, a1 = ((i + 1) / sides) * Math.PI * 2;
    sun += poly([[sx, sy], [sx + Math.cos(a0) * sr, sy + Math.sin(a0) * sr], [sx + Math.cos(a1) * sr, sy + Math.sin(a1) * sr]], shade(sunCol, (i % 2 ? 0.05 : -0.04)));
  }

  const hillCol = night ? get('--hill-mid', '#3a2f86') : get('--c2', '#4fbf6a');
  const band = (baseY, amp, seg, color, sd) => {
    const r = mulberry32(sd), ridge = [];
    for (let i = 0; i <= seg; i++) ridge.push({ x: (i / seg) * W, y: baseY + Math.sin(i * 1.4 + sd) * amp * (0.4 + r() * 0.7) });
    let t = '';
    for (let i = 0; i < seg; i++){
      t += poly([[ridge[i].x, ridge[i].y], [ridge[i + 1].x, ridge[i + 1].y], [ridge[i + 1].x, H]], shade(color, (r() - 0.5) * 0.10));
      t += poly([[ridge[i].x, ridge[i].y], [ridge[i + 1].x, H], [ridge[i].x, H]], shade(color, (r() - 0.5) * 0.10));
    }
    return t;
  };
  const hills = band(H * 0.56, 9, 6, lerpColor(hillCol, '#ffffff', night ? 0.04 : 0.28), seed + 1)
    + band(H * 0.70, 12, 7, hillCol, seed + 2);

  const fx = night ? `<defs><filter id="pg${seed}" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="1.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>` : '';
  const sunWrapped = night ? `<g filter="url(#pg${seed})">${sun}</g>` : sun;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid slice" aria-hidden="true" style="width:100%;height:100%;display:block">`
    + fx + sky + sunWrapped + hills + sceneMotif(motif, W, H, get, night) + `</svg>`;
}
function sceneMotif(motif, W, H, get, night){
  // structure colour must read against the hills in every theme (never reuse --bg)
  const ink = night ? '#cdd6ff' : '#1f4e79';
  const stroke = night ? 'rgba(10,14,40,.55)' : 'rgba(31,78,121,.35)';
  const panel = night ? '#e7ecff' : get('--surface', '#ffffff');
  const acc = get('--c4', '#ff7a5c');
  const grass = get('--c2', '#4fbf6a');
  const face = night ? '#2a2f72' : '#3a4a5c';
  if (motif === 'twin'){
    let f = `<rect x="${W*0.34}" y="${H*0.50}" width="${W*0.30}" height="${H*0.30}" fill="${ink}"/>`;
    f += poly([[W*0.34, H*0.50], [W*0.49, H*0.42], [W*0.64, H*0.50]], shade(ink, night ? -0.08 : 0.12));
    f += `<rect x="${W*0.585}" y="${H*0.40}" width="${W*0.055}" height="${H*0.12}" fill="${shade(ink, night ? -0.06 : 0.10)}"/>`;
    for (let i = 0; i < 3; i++) f += `<rect x="${W*(0.37 + i*0.09)}" y="${H*0.57}" width="${W*0.05}" height="${H*0.07}" fill="${acc}"/>`;
    return f;
  }
  if (motif === 'vr'){
    let f = `<rect x="${W*0.31}" y="${H*0.54}" width="${W*0.38}" height="${H*0.17}" rx="${H*0.07}" fill="${ink}"/>`;
    f += `<circle cx="${W*0.42}" cy="${H*0.625}" r="${H*0.045}" fill="${acc}"/>`;
    f += `<circle cx="${W*0.58}" cy="${H*0.625}" r="${H*0.045}" fill="${acc}"/>`;
    return f;
  }
  if (motif === 'web'){
    // theme-aware screen + a hairline frame so it separates from a cream/sky bg
    let f = `<rect x="${W*0.30}" y="${H*0.47}" width="${W*0.40}" height="${H*0.30}" rx="2" fill="${panel}" stroke="${stroke}" stroke-width="0.8"/>`;
    f += `<rect x="${W*0.30}" y="${H*0.47}" width="${W*0.40}" height="${H*0.07}" fill="${ink}"/>`;
    f += `<circle cx="${W*0.335}" cy="${H*0.505}" r="1.1" fill="${acc}"/>`;
    f += poly([[W*0.42, H*0.60], [W*0.50, H*0.71], [W*0.34, H*0.71]], grass);
    f += poly([[W*0.55, H*0.62], [W*0.66, H*0.71], [W*0.46, H*0.71]], shade(grass, 0.08));
    return f;
  }
  // 'game' / default: a little sheep grazing on the hill
  return `<g transform="translate(${W*0.42} ${H*0.60}) scale(0.42)">${sheepSidePolys({ wool: '#ffffff', shade: '#dfe7ee', face, eye: '#ffffff' })}</g>`;
}
/* faceted abstract portrait for team avatars */
function procAvatar(seed, accentName){

  }

  s += `<circle cx="32" cy="29" r="12.5" fill="${skin}"/>`;

const CONTENT = {

    dek: "A short engineering note on our mascot's poly budget — and why low-poly is a choice, not a compromise.",
    bodyHtml: `<p>Somebody on the team counted. Our studio sheep — the one that headbutts the logo on the loading screen — has exactly <strong>14 faces</strong>. Not 13, not 40. Fourteen. And no, we didn't run out of triangles.</p><p>Here's the honest version of the story. Early on, the sheep had closer to 300 polys: a smooth body, dainty little legs, individually modeled ears. It looked fine in a turntable render. It looked like nothing in particular when it was one of forty sheep trotting across a hillside at 60fps on a Quest headset. So we did what we always do — we asked what each face was actually <em>earning</em>.</p><h4>The 14-face budget</h4><ul><li><strong>6</strong> for the body — a soft, slightly squished cube. Reads as "fluffy" from any angle.</li><li><strong>4</strong> for the legs, two faces each. Stubby on purpose. Stubby is charming.</li><li><strong>3</strong> for the head and snout, where the silhouette does the heavy lifting.</li><li><strong>1</strong> for the tail, because a sheep without a tail is just a cloud with anxiety.</li></ul><p>Everything that <em>feels</em> like detail — the wool texture, the rosy cheeks, that smug little expression — lives in the normal map and the shading, not the geometry. That's the whole trick. <strong>Low-poly isn't fewer ideas; it's ideas pushed to the cheapest layer that can carry them.</strong></p><p>The payoff is concrete. A 14-face sheep batches beautifully. We can fill a pasture with hundreds of them and still leave the GPU plenty of headroom for lighting, physics, and the things players actually notice. It's the same discipline that keeps <em>Sheepfold Saga</em> running on a laptop and a console and a browser tab, all from one art pipeline.</p><blockquote>A polygon you don't render is the fastest polygon there is.</blockquote><p>People sometimes read "stylized" as "we couldn't do realism." We could. We've shipped photoreal digital twins of casting lines and millimeter-accurate VR welding rigs — we know exactly how expensive a face is. Which is precisely why, when the brief is "lovable sheep at frame-rate," fourteen is the right answer. The flock thanks you for not over-modeling them.</p>`,

    title: 'How we keep a digital twin at 60fps', tag: 'Studio', readTime: '4 min read',
    dek: 'The concrete performance rules we hold every real-time build to — and how they kept Foundry Live locked at 60fps.',
    bodyHtml: `<p>A digital twin only earns its keep if it stays smooth while the real machine keeps running. For <strong>Foundry Live</strong> — our living twin of a metal-casting line — 60fps is not a nice-to-have. Operators read it the way they read the floor itself, so every dropped frame is a crack in the illusion. Here is the discipline that keeps the flock moving at frame-rate.</p><h4>Budgets first, art second</h4><p>Before a single asset goes in, we write a frame budget: a hard 16.6ms divided across simulation, rendering, and the live data layer. Each system gets a millisecond allocation and a draw-call ceiling. On <strong>Foundry Live</strong> we hold the main view to roughly 1,500 draw calls and a static-mesh memory cap per zone. When something wants more, something else gives it back — the budget is the contract, not a guideline.</p><h4>Fewer calls, smarter meshes</h4><ul><li><strong>Batching:</strong> ladles, rails, and structural steel share materials and atlases so the renderer submits them in a handful of batches instead of hundreds.</li><li><strong>LODs:</strong> every prop ships three or four levels, with aggressive distance falloff. The far end of the casting hall is impostors and merged geometry; you only pay for detail you can actually see.</li><li><strong>Instancing:</strong> repeated elements — bolts, gratings, light fixtures — are GPU-instanced rather than placed as unique objects.</li></ul><h4>Live data without the stutter</h4><p>The twin streams real sensor telemetry — temperatures, flow rates, machine state — at varying rates. The trap is letting that traffic spike a frame. So we decouple it entirely: sensor reads land on a background thread, get buffered, and are interpolated onto the visuals at a fixed cadence. The render thread never blocks on the network. A late packet smooths instead of jolts, and the floor keeps moving.</p><p>None of this is exotic. It is measurement, headroom, and the willingness to cut. We profile on the <em>target</em> hardware, not a workstation, and we treat 60fps as a feature with an owner — because a twin that hitches is just an expensive screensaver.</p>`,

/* ---------------- modal (article / info reader) ---------------- */
let modalPrevFocus = null;
function modalKeydown(e){
  if (e.key === 'Escape'){ closeModal(); return; }
  if (e.key === 'Tab'){
    const card = document.querySelector('.modal-card');
    if (!card) return;
    const f = card.querySelectorAll('a[href], button, textarea, input, select, [tabindex]:not([tabindex="-1"])');
    if (!f.length) return;
    const first = f[0], last = f[f.length - 1];
    if (e.shiftKey && document.activeElement === first){ e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last){ e.preventDefault(); first.focus(); }
  }
}
function openModal(key){
  const c = CONTENT[key];
  const root = document.getElementById('modal-root');
  if (!c || !root) return;
  modalPrevFocus = document.activeElement;
  const tag = c.tag ? `<span class="chip">${c.tag}</span>` : '';
  const meta = c.readTime ? `<span class="modal-readtime">${c.readTime}</span>` : '';
  const dek = c.dek ? `<p class="modal-dek">${c.dek}</p>` : '';
  root.innerHTML = `<div class="modal-scrim">
    <article class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" aria-label="Close">✕</button>
      <header class="modal-head">${tag}${meta}<h2 class="modal-title" id="modal-title">${c.title}</h2>${dek}</header>
      <div class="modal-body">${c.bodyHtml}</div>
    </article>
  </div>`;
  const scrim = root.querySelector('.modal-scrim');
  scrim.addEventListener('click', (e) => { if (e.target === scrim) closeModal(); });
  root.querySelector('.modal-close').addEventListener('click', closeModal);
  document.addEventListener('keydown', modalKeydown);
  document.body.style.overflow = 'hidden';
  const app = document.getElementById('app');
  if (app){ app.setAttribute('inert', ''); app.setAttribute('aria-hidden', 'true'); }
  const card = root.querySelector('.modal-card');
  if (card) card.scrollTop = 0;
  root.querySelector('.modal-close').focus();
}
function closeModal(){
  const root = document.getElementById('modal-root');
  if (root) root.innerHTML = '';
  document.removeEventListener('keydown', modalKeydown);
  document.body.style.overflow = '';
  const app = document.getElementById('app');
  if (app){ app.removeAttribute('inert'); app.removeAttribute('aria-hidden'); }
  if (modalPrevFocus && modalPrevFocus.focus) modalPrevFocus.focus();
  modalPrevFocus = null;
}

/* ============================================================
   COLOUR MODE — light (Wool & Paper) / dark (Nightfall)
   ============================================================ */
function systemPrefersDark(){
  return !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
}
function resolveMode(){
  try { const m = localStorage.getItem('shippy-mode'); if (m === 'light' || m === 'dark') return m; } catch {}
  return systemPrefersDark() ? 'dark' : 'light';
}
let mode = resolveMode();
const DIRECTION_FOR = { light: 'paper', dark: 'nightfall' };

function setMode(m){
  mode = (m === 'dark') ? 'dark' : 'light';
  try { localStorage.setItem('shippy-mode', mode); } catch {}
  render();
}
function toggleMode(){ setMode(mode === 'dark' ? 'light' : 'dark'); }

/* Density is locked to comfy and the hero to the scene-split layout; the only
   live control is the light/dark switch, which drives the data-direction theme. */
function applyTheme(){
  const root = document.documentElement;
  root.setAttribute('data-direction', DIRECTION_FOR[mode]);
  root.setAttribute('data-density', 'comfy');
  const tc = getComputedStyle(root).getPropertyValue('--primary').trim();
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta && tc) meta.setAttribute('content', tc);
}

/* sun / moon switch shown in the nav + mobile drawer */
function ModeToggle(){
  const dark = mode === 'dark';
  const sun = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.4M12 19.1v2.4M4.6 4.6l1.7 1.7M17.7 17.7l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.6 19.4l1.7-1.7M17.7 6.3l1.7-1.7"/></svg>`;
  const moon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 14.5A8 8 0 0 1 9.5 4 6.5 6.5 0 1 0 20 14.5Z"/></svg>`;
  const label = dark ? 'Light mode' : 'Dark mode';
  return `<button class="mode-toggle" type="button" data-mode-toggle role="switch" aria-checked="${dark}" aria-label="Switch to ${dark ? 'light' : 'dark'} mode" title="${label}">${dark ? sun : moon}<span class="mode-label">${label}</span></button>`;
}

/* ============================================================
   REVEAL on scroll
   ============================================================ */
let revealCleanup = null;
function initReveal(){
  if (revealCleanup) revealCleanup();
  const show = (el) => { el.style.opacity = '1'; el.style.transform = 'none'; el.dataset.shown = '1'; };
  const sweep = () => {
    const vh = window.innerHeight || 800;
    document.querySelectorAll('.reveal:not([data-shown])').forEach(el => {
      if (el.getBoundingClientRect().top < vh * 0.92) show(el);
    });
  };
  let io;
  if ('IntersectionObserver' in window){
    io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting){ show(e.target); io.unobserve(e.target); } });
    }, { rootMargin: '0px 0px -8% 0px', threshold: 0.06 });
    document.querySelectorAll('.reveal:not([data-shown])').forEach(el => io.observe(el));
  }
  sweep();
  window.addEventListener('scroll', sweep, { passive: true });
  window.addEventListener('resize', sweep);
  revealCleanup = () => {
    if (io) io.disconnect();
    window.removeEventListener('scroll', sweep);
    window.removeEventListener('resize', sweep);
  };
}

/* ============================================================
   RENDER + wiring
   ============================================================ */
function goContact(){
  const el = document.getElementById('contact');
  if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 20, behavior: 'smooth' });
}

function validateContact(form){
  const data = Object.fromEntries(new FormData(form).entries());
  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email || '');
  return {
    data,
    errors: {
      name: !(data.name || '').trim() ? 'Tell us who you are' : '',
      email: !(data.email || '').trim() ? 'We need an address to reply' : (!emailOk ? 'That email looks off' : ''),
      message: !(data.message || '').trim() ? 'A sentence or two helps' : '',
    },
  };
}

function showFieldError(form, name, msg){
  const f = form.querySelector(`[data-field="${name}"]`);
  if (!f) return;
  f.classList.toggle('field-err', !!msg);
  const m = f.querySelector('[data-msg]');
  if (m){ m.textContent = msg || ''; m.style.display = msg ? '' : 'none'; }
}

function wireContact(){
  const form = document.querySelector('[data-form]');
  if (!form) return;
  ['name', 'email', 'message'].forEach(name => {
    const input = form.querySelector(`[name="${name}"]`);
    if (input) input.addEventListener('blur', () => {
      const { errors } = validateContact(form);
      showFieldError(form, name, errors[name]);
    });
  });
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const { data, errors } = validateContact(form);
    ['name', 'email', 'message'].forEach(n => showFieldError(form, n, errors[n]));
    if (errors.name || errors.email || errors.message) return;

    const right = document.querySelector('[data-contact-right]');
    const btn = form.querySelector('.contact-submit');
    const keyReady = WEB3FORMS_KEY && WEB3FORMS_KEY !== 'YOUR_WEB3FORMS_ACCESS_KEY';

    const showDone = (viaMail) => {
      const first = (data.name || '').split(' ')[0] || 'friend';
      const note = viaMail
        ? `Thanks, ${first} — we’ve opened your email app with the message ready to send. Hit send and it’s on its way to the flock.`
        : `Thanks, ${first} — your note is on its way to the flock. We’ll reply to <b>${data.email}</b> within two working days.`;
      right.innerHTML = `<div class="contact-done">
        <div class="contact-done-mark">${ShippyMark(64)}</div>
        <h3 class="h3">Message received 🎉</h3>
        <p class="muted">${note}</p>
        <button class="btn btn-ghost" data-send-another>Send another</button>
      </div>`;
      if (window.lucide) window.lucide.createIcons();
      const again = right.querySelector('[data-send-another]');
      if (again) again.addEventListener('click', () => { right.innerHTML = contactForm(); wireContact(); });
    };

    const mailtoFallback = () => {
      const subject = encodeURIComponent(`Project enquiry — ${data.name || 'Website'}`);
      const body = encodeURIComponent([
        `Name: ${data.name || ''}`, `Email: ${data.email || ''}`, `Company: ${data.company || ''}`,
        `Project type: ${data.type || ''}`, `Budget: ${data.budget || ''}`, '', (data.message || ''),
      ].join('\n'));
      window.location.href = `mailto:${CONTACT_EMAIL}?subject=${subject}&body=${body}`;
    };

    if (!keyReady){ mailtoFallback(); showDone(true); return; }

    if (btn){ btn.disabled = true; btn.dataset.html = btn.innerHTML; btn.innerHTML = 'Sending…'; }
    try {
      const res = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify({
          access_key: WEB3FORMS_KEY,
          subject: `New project enquiry from ${data.name || 'the website'}`,
          from_name: 'Shippy Sheep Studio website',
          name: data.name, email: data.email, company: data.company,
          project_type: data.type, budget: data.budget, message: data.message,
          botcheck: '',
        }),
      });
      const out = await res.json().catch(() => ({}));
      if (res.ok && out.success) showDone(false);
      else throw new Error(out.message || 'Submission failed');
    } catch (err){
      if (btn){ btn.disabled = false; if (btn.dataset.html) btn.innerHTML = btn.dataset.html; }
      mailtoFallback();
      showDone(true);
    }
  });
}

let eventsCleanup = null;
function wireEvents(){
  // tear down listeners bound on the previous render so they don't accumulate
  if (eventsCleanup) eventsCleanup();

  // contact CTAs
  document.querySelectorAll('[data-contact]').forEach(b => b.addEventListener('click', goContact));

  // nav scroll solid
  const nav = document.querySelector('[data-nav]');
  const onScroll = () => { if (nav) nav.classList.toggle('nav-solid', window.scrollY > 40); };
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
  eventsCleanup = () => window.removeEventListener('scroll', onScroll);

  // burger / drawer
  const burger = document.querySelector('[data-burger]');
  const drawer = document.querySelector('[data-drawer]');
  if (burger && drawer){
    burger.addEventListener('click', () => {
      const open = drawer.style.display !== 'flex';
      drawer.style.display = open ? 'flex' : 'none';
      burger.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    drawer.querySelectorAll('[data-drawer-link]').forEach(a => a.addEventListener('click', () => {
      drawer.style.display = 'none';
      burger.setAttribute('aria-expanded', 'false');
    }));
  }

  // light / dark switch
  document.querySelectorAll('[data-mode-toggle]').forEach(b => b.addEventListener('click', toggleMode));

  // content modals (journal articles + info pages)
  document.querySelectorAll('[data-modal]').forEach(el => el.addEventListener('click', (e) => {
    e.preventDefault();
    openModal(el.getAttribute('data-modal'));
  }));

  wireContact();
}

function render(){
  applyTheme();
  closeModal(); // any open modal is wiped by the re-render; tear it down cleanly first
  const direction = DIRECTION_FOR[mode];
  document.getElementById('root').innerHTML =
    `<div id="app" style="position:relative">
      ${Nav(direction)}
      <main>
        ${Hero('split', direction)}
        ${Services()}
        ${Portfolio()}
        ${Stats()}
        ${Mission()}
        ${Team()}
        ${Journal()}
        ${Contact()}
      </main>
      ${Footer()}
    </div><div id="modal-root"></div>`;

  wireEvents();
  initReveal();
  if (window.lucide) window.lucide.createIcons();
}

/* ============================================================
   FLOCK MINIGAME — herd the sheep, drop food to feed them
   ------------------------------------------------------------
   A persistent play layer mounted on <body> (so it lives through
   theme re-renders). The flock follows the cursor; click anywhere
   on the page background to drop a tuft of food and the nearest
   sheep break off to munch it before drifting back to the cursor.
   ============================================================ */
(function initFlockGame(){
  if (window.__flockGame) return;          // guard against double-init
  window.__flockGame = true;

  const reduce = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  const W = () => window.innerWidth;
  const H = () => window.innerHeight;
  const rand = (a, b) => a + Math.random() * (b - a);
  const NAV_H = 70;                        // keep the flock below the sticky header
  const MAX_SHEEP = 60;
  const MAX_FOOD = 6;

  // ---- food sprite: a little grass + hay tuft (theme-agnostic) ----
  function foodSprite(){
    return `<svg width="40" height="34" viewBox="0 0 40 34" aria-hidden="true">
      <ellipse cx="20" cy="30" rx="14" ry="3.4" fill="rgba(20,40,20,.16)"/>
      <g fill="none" stroke-linecap="round">
        <path d="M20 31 C14 23 12 14 14 7"  stroke="#3da85c" stroke-width="3"/>
        <path d="M20 31 C20 22 20 13 20 6"  stroke="#4fbf6a" stroke-width="3"/>
        <path d="M20 31 C26 23 28 14 26 7"  stroke="#3da85c" stroke-width="3"/>
        <path d="M20 31 C15 25 10 20 7 15"  stroke="#66c478" stroke-width="2.6"/>
        <path d="M20 31 C25 25 30 20 33 15" stroke="#66c478" stroke-width="2.6"/>
        <path d="M16 31 C16 24 15 18 13 13" stroke="#e0ad4a" stroke-width="2.4"/>
        <path d="M24 31 C24 24 25 18 27 13" stroke="#e7a84a" stroke-width="2.4"/>
      </g>
      <circle cx="13" cy="12" r="2.3" fill="#f0c560"/>
      <circle cx="27" cy="12" r="2.3" fill="#f0c560"/>
    </svg>`;
  }

  // ---- DOM: play layer + control cluster + one-time hint ----
  const layer = document.createElement('div');
  layer.id = 'flock-game';
  layer.setAttribute('aria-hidden', 'true');

  const ctl = document.createElement('div');
  ctl.className = 'flock-ctl';
  ctl.innerHTML =
    `<button class="flock-clear" type="button" aria-label="Shoo the whole flock away" title="Shoo the flock">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <button class="flock-fab" type="button" aria-label="Spawn a sheep" title="Spawn a sheep — they'll follow your cursor">
      <span class="flock-count" data-count aria-hidden="true">0</span>
      ${WalkSheep('white', 36)}
      <span class="flock-plus" aria-hidden="true">+</span>
    </button>`;

  const hint = document.createElement('div');
  hint.className = 'flock-hint';
  hint.innerHTML = `<span><b>Herd the flock!</b> They follow your cursor — click anywhere to drop food 🌾</span>
    <button class="flock-hint-x" type="button" aria-label="Dismiss hint">✕</button>`;

  document.body.appendChild(layer);
  document.body.appendChild(ctl);
  document.body.appendChild(hint);

  const countEl = ctl.querySelector('[data-count]');
  const clearBtn = ctl.querySelector('.flock-clear');

  // ---- state ----
  const sheep = [];
  const foods = [];
  let pointer = { x: W() / 2, y: H() * 0.45 };
  let n = 0;                                // monotonic counter → deterministic colour/size variety
  let raf = 0, running = false;

  function refreshControls(){
    countEl.textContent = sheep.length;
    countEl.dataset.show = sheep.length ? '1' : '0';
    clearBtn.dataset.show = sheep.length ? '1' : '0';
  }

  function ensureLoop(){ if (!running){ running = true; raf = requestAnimationFrame(step); } }

  // ---- spawn / despawn ----
  function makeSheep(x, y){
    if (sheep.length >= MAX_SHEEP) return;
    n++;
    const color = SHEEP_KEYS[n % SHEEP_KEYS.length];
    const size = 34 + (n * 11 % 20);                 // 34..53
    const el = document.createElement('div');
    el.className = 'flock-unit';
    el.innerHTML = `<div class="flock-unit-face">${WalkSheep(color, size)}</div>`;
    layer.appendChild(el);
    sheep.push({
      el, face: el.firstChild,
      x, y, vx: 0, vy: 0,
      dir: 1, eat: 0,
      bob: rand(0, 6.28),
      sp: rand(0.86, 1.18),                          // per-sheep speed variance
    });
    refreshControls();
    ensureLoop();
  }

  function spawnFromFab(){
    const r = ctl.getBoundingClientRect();
    makeSheep(r.left + rand(0, r.width), r.top + 6);
    dismissHint(false);
  }

  function dropFood(x, y){
    if (!sheep.length) return;                       // nothing around to eat it
    if (foods.length >= MAX_FOOD){ const old = foods.shift(); old.el.remove(); }
    const el = document.createElement('div');
    el.className = 'flock-food';
    el.innerHTML = foodSprite();
    el.style.transform = `translate3d(${(x - 20).toFixed(1)}px, ${(y - 26).toFixed(1)}px, 0)`;
    layer.appendChild(el);
    foods.push({ x, y, el, amount: 100, max: 100 });
    dismissHint(true);
    ensureLoop();
  }

  function clearFlock(){
    sheep.forEach(s => { const el = s.el; el.classList.add('poof'); setTimeout(() => el.remove(), 320); });
    sheep.length = 0;
    foods.forEach(f => f.el.remove());
    foods.length = 0;
    refreshControls();
  }

  // ---- the simulation: seek (cursor or nearest food) + separation ----
  function step(){
    const w = W(), h = H(), maxY = h - 12;

    for (const s of sheep){
      // pick a target: nearest food wins over the cursor
      let tx = pointer.x, ty = pointer.y, food = null, best = Infinity;
      for (const f of foods){
        const d = (f.x - s.x) * (f.x - s.x) + (f.y - s.y) * (f.y - s.y);
        if (d < best){ best = d; food = f; }
      }
      if (food){ tx = food.x; ty = food.y; }

      const dx = tx - s.x, dy = ty - s.y;
      const dist = Math.hypot(dx, dy) || 1;
      const ring = food ? 8 : 30;                    // gather *around* the cursor, swarm *onto* food
      const maxSpeed = (food ? 5.4 : 4.4) * s.sp;

      let ax = 0, ay = 0;
      if (dist > ring){ ax += (dx / dist) * 0.62; ay += (dy / dist) * 0.62; }
      else { s.vx *= 0.8; s.vy *= 0.8; }

      // separation so they crowd without stacking
      for (const o of sheep){
        if (o === s) continue;
        const ox = s.x - o.x, oy = s.y - o.y;
        const od2 = ox * ox + oy * oy;
        if (od2 > 0.01 && od2 < 34 * 34){
          const od = Math.sqrt(od2), push = (34 - od) / 34 * 0.5;
          ax += (ox / od) * push; ay += (oy / od) * push;
        }
      }

      s.vx = (s.vx + ax) * 0.86;
      s.vy = (s.vy + ay) * 0.86;
      const spd = Math.hypot(s.vx, s.vy);
      if (spd > maxSpeed){ s.vx = s.vx / spd * maxSpeed; s.vy = s.vy / spd * maxSpeed; }

      s.x += s.vx; s.y += s.vy;
      s.x = Math.max(10, Math.min(w - 10, s.x));
      s.y = Math.max(NAV_H + 6, Math.min(maxY, s.y));

      // eating: nibble the food this sheep is sitting on
      if (food && dist < ring + 12){
        s.eat = Math.min(1, s.eat + 0.06);
        food.amount -= 0.55;
      } else {
        s.eat = Math.max(0, s.eat - 0.07);
      }

      // facing + liveliness (the side sheep is drawn facing right)
      if (Math.abs(s.vx) > 0.4) s.dir = s.vx < 0 ? -1 : 1;
      s.bob += reduce ? 0 : (0.16 + spd * 0.03);
      const bobY = reduce ? 0 : Math.sin(s.bob) * (1.6 + spd * 0.55);
      const tilt = reduce ? 0 : Math.max(-9, Math.min(9, s.vx * 1.3));
      const chomp = s.eat > 0 ? Math.abs(Math.sin(s.bob * 2.2)) * s.eat * 3.2 : 0;
      s.el.style.transform = `translate3d(${s.x.toFixed(1)}px, ${(s.y + bobY + chomp).toFixed(1)}px, 0) rotate(${tilt.toFixed(1)}deg)`;
      s.face.style.transform = `scaleX(${s.dir})`;
    }

    // food wilts over time and shrinks as it's eaten; remove when gone
    for (let i = foods.length - 1; i >= 0; i--){
      const f = foods[i];
      f.amount -= 0.18;
      const k = Math.max(0, Math.min(1, f.amount / f.max));
      f.el.style.opacity = k.toFixed(2);
      f.el.firstChild.style.transform = `scale(${(0.45 + k * 0.55).toFixed(3)})`;
      f.el.firstChild.style.transformOrigin = '50% 90%';
      if (f.amount <= 0){ f.el.remove(); foods.splice(i, 1); }
    }

    if (!sheep.length && !foods.length){ running = false; return; }   // idle → stop burning frames
    raf = requestAnimationFrame(step);
  }

  // ---- hint (shown once until dismissed/used) ----
  let hintSeen = false;
  try { hintSeen = !!localStorage.getItem('shippy-flock-hint'); } catch {}
  function dismissHint(persist){
    if (hint.dataset.show === '1') hint.dataset.show = '0';
    if (persist && !hintSeen){ hintSeen = true; try { localStorage.setItem('shippy-flock-hint', '1'); } catch {} }
  }

  // ---- wiring ----
  window.addEventListener('pointermove', (e) => { pointer.x = e.clientX; pointer.y = e.clientY; }, { passive: true });

  ctl.querySelector('.flock-fab').addEventListener('click', spawnFromFab);
  clearBtn.addEventListener('click', clearFlock);
  hint.querySelector('.flock-hint-x').addEventListener('click', () => dismissHint(true));

  // click the page background → drop food (but never hijack real UI or a modal)
  window.addEventListener('click', (e) => {
    if (document.querySelector('.modal-scrim')) return;
    if (e.target.closest('a, button, input, textarea, select, label, summary, [role="button"], [contenteditable], .flock-ctl, .flock-hint')) return;
    if (window.getSelection && String(window.getSelection()).trim().length) return;
    dropFood(e.clientX, e.clientY);
  }, { passive: true });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden){ if (raf) cancelAnimationFrame(raf); running = false; }
    else ensureLoop();
  });

  // ---- kick-off: a few sheep already mingling (skipped under reduced-motion) ----
  refreshControls();
  if (!reduce){
    const seedN = W() < 680 ? 3 : 5;
    for (let i = 0; i < seedN; i++) makeSheep(rand(W() * 0.12, W() * 0.88), rand(H() * 0.35, H() * 0.7));
    if (!hintSeen) setTimeout(() => { if (!hintSeen) hint.dataset.show = '1'; }, 1400);
  }
})();
</script>
</body>
</html>
